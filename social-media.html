<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Images - Pizza World Marketing Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #d91f1f;
            --dark: #111;
            --dark2: #1c1c1c;
            --light: #e0e0e0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--dark);
            color: var(--light);
            font-family: 'Open Sans', sans-serif;
            line-height: 1.6;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.97);
            border-bottom: 2px solid var(--red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 70px;
        }
        nav img {
            height: 50px;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--red);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 40px 60px;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header h1 span {
            color: var(--red);
        }
        .header p {
            font-size: 18px;
            color: #999;
            font-weight: 300;
        }
        .instructions {
            background: rgba(217, 31, 31, 0.1);
            border-left: 4px solid var(--red);
            padding: 25px;
            margin-bottom: 40px;
            border-radius: 4px;
        }
        .instructions h3 {
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .instructions ol {
            margin-left: 20px;
            line-height: 2;
        }
        .instructions li {
            margin-bottom: 10px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            background: var(--dark2);
            aspect-ratio: 1;
            transition: transform 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.02);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(217, 31, 31, 0);
            transition: background 0.3s;
            pointer-events: none;
        }
        .gallery-item:hover::after {
            background: rgba(217, 31, 31, 0.3);
        }
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .lightbox-image {
            max-width: 100%;
            max-height: 85%;
            object-fit: contain;
        }
        .lightbox-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 20px;
            gap: 20px;
        }
        .lightbox-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Oswald', sans-serif;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
        }
        .lightbox-btn:hover {
            background: #a01515;
        }
        .lightbox-btn.prev, .lightbox-btn.next {
            flex: 0 0 auto;
        }
        .lightbox-counter {
            flex: 1;
            text-align: center;
            color: var(--light);
            font-family: 'Oswald', sans-serif;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--red);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .close-btn:hover {
            background: #a01515;
        }
        @media (max-width: 768px) {
            .container {
                padding: 100px 20px 40px;
            }
            nav {
                padding: 0 20px;
            }
            .header h1 {
                font-size: 32px;
            }
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html"><img src="https://mypizzaworld.net/wp-content/uploads/2024/02/PW-NEW-logo-1996-R-1.png" style="height:50px;" alt="Pizza World Logo" /></a>
        <a href="index.html">← Back to Hub</a>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Social Media <span>Images</span></h1>
            <p>Download, copy and post directly to your social channels</p>
        </div>

        <div class="instructions">
            <h3>How to use:</h3>
            <ol>
                <li>Click image to open full size</li>
                <li>Right-click → Save Image</li>
                <li>Post directly to Facebook, Instagram, or TikTok</li>
            </ol>
        </div>

        <div class="gallery" id="gallery">
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/05/3B-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/04/DC1_April_June_23_PizzaWorldCC-1-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/05/4-4A-PizzaWorldGC-MayJul23-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/04/DC1_April_June_23_PizzaWorldCC-1-1-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2021/05/PW_decfeb21_1b-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2021/05/PW_decfeb21_3a-3-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/05/1B_decfeb23_PizzaWorldCC-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/05/1B-Pizza-World-GC_Sprint_FebApr-2023-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/04/2A_April_June_23_PizzaWorldCC-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/04/DC2_April_June_23_PizzaWorldCC-1-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2021/05/PW_decfeb21_2a-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/10/4a_4_juneaugust21-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/05/3B-Pizza-World_GC-MayJuly-2023-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/05/1B_da_augoct_pw-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/04/2B_April_June_23_PizzaWorldCC-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/04/DC3_April_June_23_PizzaWorldCC-1-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2021/05/PW_decfeb21_3a-1-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/10/4a_1_juneaugust21-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/05/1-DC-Pizza-World_GC-MayJuly-2023-1-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/05/2-DC-Pizza-World_GC-MayJuly-2023-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/04/3A_Sprint_April_June_23_PizzaWorldCC.gif"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/04/DC4_April_June_23_PizzaWorldCC-1-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2021/05/PW_decfeb21_3a-2-1024x1024.png"></div>
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2023/10/2a_juneaugust21_pizzaworld-copy-1024x1024.png"></div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="close-btn" onclick="closeLightbox()">&times;</button>
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <div class="lightbox-controls">
                <button class="lightbox-btn prev" onclick="prevImage()">← Prev</button>
                <div class="lightbox-counter"><span id="counter">1</span> / <span id="total">1</span></div>
                <button class="lightbox-btn" onclick="downloadImage()">📥 Download</button>
                <button class="lightbox-btn next" onclick="nextImage()">Next →</button>
            </div>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let items = [];

        function initGallery() {
            items = Array.from(document.querySelectorAll('.gallery-item'));
            items.forEach((item, index) => {
                const img = document.createElement('img');
                img.src = item.dataset.src;
                img.alt = `Gallery item ${index + 1}`;
                item.appendChild(img);
                item.addEventListener('click', () => openLightbox(index));
            });
            document.getElementById('total').textContent = items.length;
        }

        function openLightbox(index) {
            currentIndex = index;
            const lightbox = document.getElementById('lightbox');
            const image = document.getElementById('lightboxImage');
            image.src = items[currentIndex].dataset.src;
            document.getElementById('counter').textContent = currentIndex + 1;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % items.length;
            document.getElementById('lightboxImage').src = items[currentIndex].dataset.src;
            document.getElementById('counter').textContent = currentIndex + 1;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + items.length) % items.length;
            document.getElementById('lightboxImage').src = items[currentIndex].dataset.src;
            document.getElementById('counter').textContent = currentIndex + 1;
        }

        function downloadImage() {
            const src = items[currentIndex].dataset.src;
            const filename = src.split('/').pop();
            const a = document.createElement('a');
            a.href = src;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeLightbox();
        });

        window.addEventListener('click', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (e.target === lightbox) closeLightbox();
        });

        initGallery();
    </script>
</body>
</html>
