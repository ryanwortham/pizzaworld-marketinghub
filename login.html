<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza World Marketing Hub — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #d91f1f;
            --red2: #ff3333;
            --dark: #111;
            --dark2: #1c1c1c;
            --dark3: #252525;
            --light: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark);
            color: var(--light);
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* Background texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(217,31,31,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(217,31,31,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        .login-wrap {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .login-card {
            background: var(--dark2);
            border: 1px solid #333;
            border-top: 3px solid var(--red);
            border-radius: 6px;
            padding: 50px 45px 45px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo-wrap {
            text-align: center;
            margin-bottom: 35px;
        }
        .logo-wrap img {
            height: 65px;
            filter: drop-shadow(0 4px 12px rgba(217,31,31,0.3));
        }
        .hub-label {
            display: block;
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #666;
            margin-top: 12px;
        }
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }
        h1 span { color: var(--red); }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 11px;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: var(--light);
            font-family: 'Open Sans', sans-serif;
            font-size: 15px;
            padding: 13px 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--red);
        }
        .btn-login {
            width: 100%;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-login:hover { background: #b51a1a; }
        .btn-login:active { transform: scale(0.99); }
        .error-msg {
            display: none;
            background: rgba(217,31,31,0.15);
            border: 1px solid rgba(217,31,31,0.4);
            color: #ff6b6b;
            font-size: 13px;
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 18px;
            text-align: center;
        }
        .error-msg.show { display: block; }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #444;
        }
        .footer-note a {
            color: #666;
            text-decoration: none;
        }
        @media (max-width: 480px) {
            .login-card { padding: 35px 25px 30px; }
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-card">
        <div class="logo-wrap">
            <img src="https://mypizzaworld.net/wp-content/uploads/2024/02/PW-NEW-logo-1996-R-1.png" alt="Pizza World Logo">
            <span class="hub-label">Marketing Hub</span>
        </div>
        <h1>Sign <span>In</span></h1>
        <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            <div class="error-msg" id="errorMsg">Incorrect username or password. Please try again.</div>
        </form>
    </div>
    <div class="footer-note">
        &copy; 2024 Pizza World USA &mdash; Franchisee Resource Portal<br>
        <a href="mailto:ryan@pizzaworldusa.net">Contact Support</a>
    </div>
</div>

<script>
// ============================================================
//  USERS — Edit this list to add or remove users
//  Roles: 'admin' (can view login log), 'user' (standard access)
// ============================================================
const USERS = [
    { username: 'ryan@pizzaworldusa.net',       password: 'PizzaWorld2024!',  name: 'Ryan Wortham',       role: 'admin' },
    { username: 'jed@powerofadvertising.com',      password: 'Maven2026!',     name: 'Marketing Director',   role: 'admin'  },
    { username: 'eric@pizzaworldusa.net',      password: 'increase',     name: 'Founder/Chairman',   role: 'user'  },
    { username: 'rod@pizzaworldusa.net',      password: 'increase',     name: 'Store Manager 03',   role: 'user'  },
    { username: 'owner01',    password: 'Franchise2024!',   name: 'Franchise Owner 01', role: 'user'  },
    { username: 'owner02',    password: 'Franchise2024!',   name: 'Franchise Owner 02', role: 'user'  },
    { username: 'owner03',    password: 'Franchise2024!',   name: 'Franchise Owner 03', role: 'user'  },
    { username: 'owner04',    password: 'Franchise2024!',   name: 'Franchise Owner 04', role: 'user'  },
    { username: 'owner05',    password: 'Franchise2024!',   name: 'Franchise Owner 05', role: 'user'  },
];

// ============================================================
//  OPTIONAL: Set a Google Sheets webhook URL to log logins
//  remotely. Leave blank to only log locally.
//  Setup instructions: see admin.html for details.
// ============================================================
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwLL18qJhpQnIZt84OqJlB1VgkpCwqhfuIUlbFcTK1FxBBIDBRrOEtTlvTETMgxtTs/exec';

// Session duration in hours
const SESSION_HOURS = 8;

function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    btn.textContent = 'Signing In…';
    btn.disabled = true;
    errorMsg.classList.remove('show');

    // Small delay to prevent brute-force timing
    setTimeout(() => {
        const user = USERS.find(u => u.username.toLowerCase() === username && u.password === password);

        if (user) {
            // Create session
            const sessionData = {
                u: user.username,
                name: user.name,
                role: user.role,
                exp: Date.now() + (SESSION_HOURS * 60 * 60 * 1000)
            };
            sessionStorage.setItem('pw_session', JSON.stringify(sessionData));

            // Log this login event
            logLogin(user);

            // Redirect
            const returnTo = sessionStorage.getItem('pw_return') || 'index.html';
            sessionStorage.removeItem('pw_return');
            window.location.href = returnTo;
        } else {
            errorMsg.classList.add('show');
            btn.textContent = 'Sign In';
            btn.disabled = false;
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    }, 400);
}

function logLogin(user) {
    const now = new Date();
    const entry = {
        username:  user.username,
        name:      user.name,
        role:      user.role,
        ts:        now.getTime(),
        dateStr:   now.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }),
        timeStr:   now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12: true }),
        browser:   getBrowserInfo()
    };

    // Save to localStorage
    let log = [];
    try { log = JSON.parse(localStorage.getItem('pw_login_log') || '[]'); } catch(e) {}
    log.unshift(entry);
    // Keep last 1000 entries
    if (log.length > 1000) log = log.slice(0, 1000);
    localStorage.setItem('pw_login_log', JSON.stringify(log));

    // Optional: send to webhook (Google Sheets or similar)
    if (WEBHOOK_URL) {
        try {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            }).catch(() => {});
        } catch(e) {}
    }
}

function getBrowserInfo() {
    const ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/.test(ua)) return 'iOS / Safari';
    if (/Android/.test(ua)) return 'Android';
    if (/Chrome/.test(ua)) return 'Chrome';
    if (/Firefox/.test(ua)) return 'Firefox';
    if (/Safari/.test(ua)) return 'Safari';
    if (/Edge/.test(ua)) return 'Edge';
    return 'Browser';
}

// If already logged in, go straight to hub
(function() {
    const s = sessionStorage.getItem('pw_session');
    if (s) {
        try {
            const d = JSON.parse(s);
            if (d.u && Date.now() < d.exp) {
                window.location.replace('index.html');
            }
        } catch(e) {}
    }
})();
</script>
</body>
</html>
