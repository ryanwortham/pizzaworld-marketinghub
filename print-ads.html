<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function(){var s=sessionStorage.getItem("pw_session");if(!s){sessionStorage.setItem("pw_return",location.pathname.split("/").pop());window.location.replace("login.html");return;}try{var d=JSON.parse(s);if(!d.u||Date.now()>d.exp){sessionStorage.removeItem("pw_session");sessionStorage.setItem("pw_return",location.pathname.split("/").pop());window.location.replace("login.html");}}catch(e){window.location.replace("login.html");}})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Advertisements - Pizza World Marketing Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #d91f1f;
            --dark: #111;
            --dark2: #1c1c1c;
            --light: #e0e0e0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--dark);
            color: var(--light);
            font-family: 'Open Sans', sans-serif;
            line-height: 1.6;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.97);
            border-bottom: 2px solid var(--red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 70px;
        }
        nav img {
            height: 50px;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--red);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 40px 60px;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header h1 span {
            color: var(--red);
        }
        .header p {
            font-size: 18px;
            color: #999;
            font-weight: 300;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            background: var(--dark2);
        }
        .gallery-item-wrapper {
            position: relative;
            padding-bottom: 133.33%;
            overflow: hidden;
        }
        .gallery-item-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }
        .gallery-item:hover .gallery-item-image {
            transform: scale(1.02);
        }
        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(217, 31, 31, 0);
            transition: background 0.3s;
            pointer-events: none;
            z-index: 1;
        }
        .gallery-item:hover::after {
            background: rgba(217, 31, 31, 0.3);
        }
        .gallery-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px;
            font-family: 'Oswald', sans-serif;
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--red);
            z-index: 2;
        }
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .lightbox-image {
            max-width: 100%;
            max-height: 85%;
            object-fit: contain;
        }
        .lightbox-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 20px;
            gap: 20px;
        }
        .lightbox-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Oswald', sans-serif;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
        }
        .lightbox-btn:hover {
            background: #a01515;
        }
        .lightbox-btn.prev, .lightbox-btn.next {
            flex: 0 0 auto;
        }
        .lightbox-counter {
            flex: 1;
            text-align: center;
            color: var(--light);
            font-family: 'Oswald', sans-serif;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--red);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .close-btn:hover {
            background: #a01515;
        }
        @media (max-width: 768px) {
            .container {
                padding: 100px 20px 40px;
            }
            nav {
                padding: 0 20px;
            }
            .header h1 {
                font-size: 32px;
            }
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html"><img src="https://mypizzaworld.net/wp-content/uploads/2024/02/PW-NEW-logo-1996-R-1.png" style="height:50px;" alt="Pizza World Logo" /></a>
        <a href="index.html">← Back to Hub</a>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Print <span>Advertisements</span></h1>
            <p>Professional print-ready ads for local advertising campaigns</p>
        </div>

        <div class="gallery" id="gallery">
            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_6.5x9_FRONT-scaled.jpg" data-label="6.5x9 Front">
                <div class="gallery-item-wrapper">
                    <img class="gallery-item-image" src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_6.5x9_FRONT-scaled.jpg" alt="6.5x9 Front">
                </div>
                <div class="gallery-label">6.5x9 Front</div>
            </div>

            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_6.5x9_BACK-scaled.jpg" data-label="6.5x9 Back">
                <div class="gallery-item-wrapper">
                    <img class="gallery-item-image" src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_6.5x9_BACK-scaled.jpg" alt="6.5x9 Back">
                </div>
                <div class="gallery-label">6.5x9 Back</div>
            </div>

            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_PC_12x6.5_FRONT-scaled.jpg" data-label="12x6.5 Front">
                <div class="gallery-item-wrapper">
                    <img class="gallery-item-image" src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_PC_12x6.5_FRONT-scaled.jpg" alt="12x6.5 Front">
                </div>
                <div class="gallery-label">12x6.5 Front</div>
            </div>

            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_PC_12x6.5_BACK-scaled.jpg" data-label="12x6.5 Back">
                <div class="gallery-item-wrapper">
                    <img class="gallery-item-image" src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_PC_12x6.5_BACK-scaled.jpg" alt="12x6.5 Back">
                </div>
                <div class="gallery-label">12x6.5 Back</div>
            </div>

            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_8.5x11_FRONT-scaled.jpg" data-label="8.5x11 Front">
                <div class="gallery-item-wrapper">
                    <img class="gallery-item-image" src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_8.5x11_FRONT-scaled.jpg" alt="8.5x11 Front">
                </div>
                <div class="gallery-label">8.5x11 Front</div>
            </div>

            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_8.5x11_BACK-scaled.jpg" data-label="8.5x11 Back">
                <div class="gallery-item-wrapper">
                    <img class="gallery-item-image" src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_8.5x11_BACK-scaled.jpg" alt="8.5x11 Back">
                </div>
                <div class="gallery-label">8.5x11 Back</div>
            </div>

            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_8.5x11_pizza-menu_BACK-scaled.jpg" data-label="8.5x11 Menu Back">
                <div class="gallery-item-wrapper">
                    <img class="gallery-item-image" src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_8.5x11_pizza-menu_BACK-scaled.jpg" alt="8.5x11 Menu Back">
                </div>
                <div class="gallery-label">8.5x11 Menu Back</div>
            </div>

            <div class="gallery-item" data-src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_8.5x11_pizza-menu_FRONT-scaled.jpg" data-label="8.5x11 Menu Front">
                <div class="gallery-item-wrapper">
                    <img class="gallery-item-image" src="https://mypizzaworld.net/wp-content/uploads/2024/09/Pizza_World_March_2024_Marketing_PC_8.5x11_pizza-menu_FRONT-scaled.jpg" alt="8.5x11 Menu Front">
                </div>
                <div class="gallery-label">8.5x11 Menu Front</div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="close-btn" onclick="closeLightbox()">&times;</button>
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <div class="lightbox-controls">
                <button class="lightbox-btn prev" onclick="prevImage()">← Prev</button>
                <div class="lightbox-counter"><span id="counter">1</span> / <span id="total">1</span></div>
                <button class="lightbox-btn" onclick="downloadImage()">📥 Download</button>
                <button class="lightbox-btn next" onclick="nextImage()">Next →</button>
            </div>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let items = [];

        function initGallery() {
            items = Array.from(document.querySelectorAll('.gallery-item'));
            items.forEach((item, index) => {
                item.addEventListener('click', () => openLightbox(index));
            });
            document.getElementById('total').textContent = items.length;
        }

        function openLightbox(index) {
            currentIndex = index;
            const lightbox = document.getElementById('lightbox');
            const image = document.getElementById('lightboxImage');
            image.src = items[currentIndex].dataset.src;
            document.getElementById('counter').textContent = currentIndex + 1;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % items.length;
            document.getElementById('lightboxImage').src = items[currentIndex].dataset.src;
            document.getElementById('counter').textContent = currentIndex + 1;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + items.length) % items.length;
            document.getElementById('lightboxImage').src = items[currentIndex].dataset.src;
            document.getElementById('counter').textContent = currentIndex + 1;
        }

        function downloadImage() {
            const src = items[currentIndex].dataset.src;
            const filename = src.split('/').pop();
            const a = document.createElement('a');
            a.href = src;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeLightbox();
        });

        window.addEventListener('click', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (e.target === lightbox) closeLightbox();
        });

        initGallery();
    </script>
    <script src="auth-nav.js"></script>
</body>
</html>
